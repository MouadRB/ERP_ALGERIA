name: Integration Hub CI

on:
  push:
    paths:
      - 'integration-hub/**'
  pull_request:
    paths:
      - 'integration-hub/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test Integration Hub
        working-directory: integration-hub
        run: mvn clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-hub-test-results
          path: integration-hub/target/surefire-reports/