server:
  port: 8080


spring:
  application:
    name: erp
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/erp_db
    username: ${DB_USERNAME:erp_admin}
    password: ${DB_PASSWORD:local_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Africa/Algiers


jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  security:
    jwt:
      secret: ${JWT_SECRET:changeme-in-production-use-256-bit-minimum-key-here-please}
      expiration-ms: 900000

  outbox:
    poll-interval-ms: 1000
    batch-size: 50
    retry-max: 3
    timeout-ms: 5000

    # ── Each target has a routes map: eventType → url ──
    targets:
      - name: engine-b
        routes:
          DEFAULT: http://localhost:8082/events/ingest

      - name: engine-b-crm
        routes:
          SKU_REGISTERED: http://localhost:8083/mdm/skus/registered
          SKU_ACTIVATED: http://localhost:8083/mdm/skus/activated
          SUPPLIER_REGISTERED: http://localhost:8083/procurement/suppliers/new

      # Add more targets:
      # - name: payment-gateway
      #   routes:
      #     ORDER_CREATED: https://pay.example.com/webhooks/orders
      #     ORDER_CANCELLED: https://pay.example.com/webhooks/cancellations

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.dz.erp: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
